<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勤怠管理システム — デモ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #080c14;
  --s1:     #0f1623;
  --s2:     #161f30;
  --s3:     #1c2840;
  --b:      #1e2d45;
  --b2:     #243450;
  --acc:    #38bdf8;
  --green:  #34d399;
  --amber:  #fbbf24;
  --orange: #fb923c;
  --red:    #f87171;
  --purple: #a78bfa;
  --text:   #e2e8f0;
  --t2:     #94a3b8;
  --t3:     #3f5468;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:220px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--b);
  display:flex;flex-direction:column;height:100vh;
}
.sb-logo{
  padding:22px 20px 16px;border-bottom:1px solid var(--b);
  font-family:'DM Mono',monospace;font-size:11px;color:var(--acc);
  letter-spacing:.12em;
}
.sb-logo span{display:block;font-size:9px;color:var(--t3);margin-top:3px;letter-spacing:.06em}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sb-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:9px;cursor:pointer;margin-bottom:2px;
  font-size:13px;color:var(--t2);transition:all .15s;
}
.sb-item:hover{background:var(--s2);color:var(--text)}
.sb-item.active{background:rgba(56,189,248,.1);color:var(--acc)}
.sb-item .icon{font-size:15px;width:20px;text-align:center}
.sb-user{
  padding:14px 16px;border-top:1px solid var(--b);
  display:flex;align-items:center;gap:10px;cursor:pointer;
}
.sb-avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--acc),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#0a0f1e;flex-shrink:0;
}
.sb-name{font-size:12px;font-weight:500}
.sb-role{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;background:var(--bg)}

/* ── PAGES ── */
.page{display:none;padding:28px 32px;min-height:100vh}
.page.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.page-title{font-size:20px;font-weight:700;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--t2);margin-bottom:24px}

/* ── CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.kpi{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:18px 20px}
.kpi-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.kpi-val{font-size:28px;font-weight:700;font-family:'DM Mono',monospace}
.kpi-sub{font-size:11px;color:var(--t3);margin-top:4px}

/* ── TABLE ── */
.card{background:var(--s1);border:1px solid var(--b);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:10px 16px;text-align:left;color:var(--t3);font-size:10px;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:.06em;border-bottom:1px solid var(--b);background:rgba(0,0,0,.2)}
td{padding:11px 16px;border-bottom:1px solid rgba(30,45,69,.5);color:var(--t2)}
tr:last-child td{border-bottom:0}
tr:hover td{background:rgba(255,255,255,.02);color:var(--text)}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-family:'DM Mono',monospace;font-weight:500;border:1px solid}
.b-green {color:var(--green); background:rgba(52,211,153,.1); border-color:rgba(52,211,153,.2)}
.b-amber {color:var(--amber); background:rgba(251,191,36,.1);  border-color:rgba(251,191,36,.2)}
.b-red   {color:var(--red);   background:rgba(248,113,113,.1); border-color:rgba(248,113,113,.2)}
.b-blue  {color:var(--acc);   background:rgba(56,189,248,.1);  border-color:rgba(56,189,248,.2)}
.b-gray  {color:var(--t2);    background:rgba(148,163,184,.07);border-color:rgba(148,163,184,.1)}
.b-purple{color:var(--purple);background:rgba(167,139,250,.1); border-color:rgba(167,139,250,.2)}

/* ── STAMP PAGE ── */
.stamp-wrap{max-width:480px;margin:0 auto}
.time-display{
  text-align:center;padding:40px 20px 32px;
  background:var(--s1);border:1px solid var(--b);border-radius:20px;margin-bottom:16px;
}
.clock{font-family:'DM Mono',monospace;font-size:52px;font-weight:400;letter-spacing:.06em;line-height:1}
.clock-date{font-size:13px;color:var(--t2);margin-top:8px}
.status-pill{
  display:inline-flex;align-items:center;gap:6px;margin-top:14px;
  padding:5px 14px;border-radius:20px;font-size:12px;font-family:'DM Mono',monospace;
}
.status-dot-live{width:7px;height:7px;border-radius:50%;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.stamp-btn{
  padding:18px;border-radius:14px;border:1.5px solid;cursor:pointer;
  font-size:14px;font-weight:600;font-family:'Noto Sans JP',sans-serif;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:all .15s;
}
.stamp-btn .btn-icon{font-size:24px}
.stamp-btn:hover:not(:disabled){filter:brightness(1.15);transform:translateY(-1px)}
.stamp-btn:disabled{opacity:.35;cursor:not-allowed}
.btn-in  {background:rgba(52,211,153,.1); border-color:rgba(52,211,153,.3); color:var(--green)}
.btn-out {background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:var(--red)}
.btn-brk {background:rgba(251,191,36,.1); border-color:rgba(251,191,36,.3); color:var(--amber)}
.btn-brke{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2); color:var(--amber)}
.btn-remote{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.3);color:var(--purple)}
.today-log{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:16px 20px}
.log-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(30,45,69,.5)}
.log-row:last-child{border-bottom:0}
.log-label{font-size:12px;color:var(--t3)}
.log-val{font-size:13px;font-family:'DM Mono',monospace;font-weight:500}

/* ── PROGRESS BAR ── */
.prog-bar{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:3px;transition:width .6s ease}

/* ── FORM ── */
.form-card{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:24px;max-width:560px}
.form-label{font-size:11px;color:var(--t2);margin-bottom:6px;display:block}
.form-input{
  width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:10px;
  padding:10px 14px;color:var(--text);font-size:13px;font-family:'Noto Sans JP',sans-serif;
  outline:none;transition:border-color .15s;margin-bottom:14px;
}
.form-input:focus{border-color:var(--acc)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.type-card{
  padding:12px;border-radius:10px;border:1.5px solid var(--b);
  cursor:pointer;transition:all .15s;text-align:left;background:var(--s2);
}
.type-card:hover{border-color:var(--b2)}
.type-card.selected{background:rgba(56,189,248,.08);border-color:rgba(56,189,248,.3)}
.type-icon{font-size:20px;margin-bottom:4px}
.type-name{font-size:12px;font-weight:600;color:var(--text)}
.type-desc{font-size:10px;color:var(--t3);margin-top:2px}
.submit-btn{
  width:100%;padding:13px;border-radius:11px;border:0;
  background:var(--acc);color:#0a0f1e;font-size:14px;font-weight:700;
  font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .15s;
}
.submit-btn:hover{background:#7dd3fc}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--s2);border:1px solid var(--b2);border-radius:12px;
  padding:12px 20px;font-size:13px;display:flex;align-items:center;gap:8px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);transition:transform .3s ease;z-index:999;
  white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}


/* ── DEMO ACCOUNT CARDS ── */
.demo-account{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:10px;border:1.5px solid var(--b);
  cursor:pointer;margin-bottom:8px;transition:all .18s;background:var(--s2);
}
.demo-account:hover{border-color:var(--b2);background:var(--s3);transform:translateY(-1px)}
.demo-account.selected{border-color:rgba(56,189,248,.4);background:rgba(56,189,248,.07)}
.demo-av{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;
}
.demo-info{flex:1}
.demo-name{font-size:13px;font-weight:600;color:var(--text)}
.demo-email{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;margin-top:1px}
.demo-arrow{font-size:14px;color:var(--t3);transition:all .18s}
.demo-account:hover .demo-arrow{color:var(--acc);transform:translateX(2px)}
.demo-account.selected .demo-arrow{color:var(--acc)}

/* ── LOGIN ── */
.login-wrap{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:var(--bg);
}
.login-box{
  width:360px;background:var(--s1);border:1px solid var(--b);
  border-radius:20px;padding:40px 32px;
}
.login-logo{font-family:'DM Mono',monospace;font-size:13px;color:var(--acc);letter-spacing:.12em;margin-bottom:4px}
.login-title{font-size:22px;font-weight:700;margin-bottom:6px}
.login-sub{font-size:12px;color:var(--t2);margin-bottom:28px}
.login-error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:14px;display:none}

/* ── CHART ── */
.chart-wrap{padding:20px;overflow-x:auto}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:120px;min-width:600px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar{border-radius:4px 4px 0 0;min-height:2px;transition:height .4s ease;cursor:pointer;position:relative}
.bar:hover::after{
  content:attr(data-tip);position:absolute;bottom:calc(100%+6px);left:50%;
  transform:translateX(-50%);background:var(--s3);border:1px solid var(--b2);
  border-radius:6px;padding:4px 8px;font-size:10px;color:var(--text);
  white-space:nowrap;font-family:'DM Mono',monospace;pointer-events:none;z-index:10;
}
.bar-label{font-size:9px;color:var(--t3);font-family:'DM Mono',monospace}

/* ── GAUGE ── */
.gauge-wrap{padding:20px 24px}
.gauge-track{height:10px;background:var(--s3);border-radius:5px;position:relative;overflow:visible;margin-bottom:8px}
.gauge-fill{height:100%;border-radius:5px;transition:width .8s ease;position:relative}
.gauge-mark{position:absolute;top:-4px;width:2px;height:18px;border-radius:1px;opacity:.6}
.gauge-labels{display:flex;justify-content:space-between;font-size:10px;font-family:'DM Mono',monospace;color:var(--t3)}

/* ── ALERT CARD ── */
.alert-item{
  display:flex;align-items:center;gap:14px;
  padding:12px 20px;border-bottom:1px solid rgba(30,45,69,.5);
}
.alert-item:last-child{border-bottom:0}
.alert-avatar{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
}
.alert-name{font-size:13px;font-weight:500}
.alert-dept{font-size:11px;color:var(--t3)}
.alert-prog{flex:1;margin:0 16px}
.alert-h{font-size:13px;font-family:'DM Mono',monospace;font-weight:600;text-align:right;min-width:48px}

/* ── APPROVAL ── */
.appr-item{
  display:flex;align-items:center;gap:14px;
  padding:13px 20px;border-bottom:1px solid rgba(30,45,69,.5);
}
.appr-item:last-child{border-bottom:0}
.appr-info{flex:1}
.appr-name{font-size:13px;font-weight:500;margin-bottom:2px}
.appr-detail{font-size:11px;color:var(--t3)}
.appr-btns{display:flex;gap:8px}
.btn-approve{
  padding:6px 14px;border-radius:8px;border:1px solid rgba(52,211,153,.3);
  background:rgba(52,211,153,.1);color:var(--green);font-size:12px;font-weight:600;
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;
}
.btn-approve:hover{background:rgba(52,211,153,.2)}
.btn-reject{
  padding:6px 14px;border-radius:8px;border:1px solid rgba(248,113,113,.3);
  background:rgba(248,113,113,.1);color:var(--red);font-size:12px;font-weight:600;
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;
}
.btn-reject:hover{background:rgba(248,113,113,.2)}

/* ── MONTHLY CHART SECTION ── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.stat{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:16px 18px}
.stat-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.stat-val{font-size:24px;font-weight:700;font-family:'DM Mono',monospace}
</style>
</head>
<body>

<!-- ================================================================ LOGIN -->
<div id="login-page" style="width:100%;position:fixed;inset:0;z-index:100;background:var(--bg)">
<div class="login-wrap">
<div class="login-box">
  <div class="login-logo">KINTAI SYSTEM</div>
  <div class="login-title">おはようございます</div>
  <div class="login-sub">デモ用アカウントでログインしてください</div>
  <div class="login-error" id="login-err">メールアドレスまたはパスワードが正しくありません</div>
  <label class="form-label">メールアドレス</label>
  <input class="form-input" id="login-email" type="email" value="yamada@company.example.com" placeholder="email">
  <label class="form-label">パスワード</label>
  <input class="form-input" id="login-pass" type="password" value="Emp@password123" placeholder="password">
  <button class="submit-btn" onclick="doLogin()" style="margin-top:4px">ログイン</button>
  <div style="margin-top:20px">
    <div style="font-size:10px;font-family:'DM Mono',monospace;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">クリックで切り替え</div>
    <div class="demo-account selected" onclick="selectAccount('yamada@company.example.com','Emp@password123')">
      <div class="demo-av" style="background:rgba(56,189,248,.15);color:var(--acc)">山</div>
      <div class="demo-info">
        <div class="demo-name">山田 太郎 <span class="badge b-blue" style="font-size:9px;margin-left:4px">一般社員</span></div>
        <div class="demo-email">yamada@company.example.com</div>
      </div>
      <span class="demo-arrow">→</span>
    </div>
    <div class="demo-account" onclick="selectAccount('manager@company.example.com','Mgr@password123')">
      <div class="demo-av" style="background:rgba(167,139,250,.15);color:var(--purple)">田</div>
      <div class="demo-info">
        <div class="demo-name">田中 マネージャー <span class="badge b-purple" style="font-size:9px;margin-left:4px">管理者</span></div>
        <div class="demo-email">manager@company.example.com</div>
      </div>
      <span class="demo-arrow">→</span>
    </div>
    <div class="demo-account" onclick="selectAccount('hr@company.example.com','Hr@password123')">
      <div class="demo-av" style="background:rgba(52,211,153,.15);color:var(--green)">鈴</div>
      <div class="demo-info">
        <div class="demo-name">鈴木 人事 <span class="badge b-green" style="font-size:9px;margin-left:4px">人事</span></div>
        <div class="demo-email">hr@company.example.com</div>
      </div>
      <span class="demo-arrow">→</span>
    </div>
  </div>
</div>
</div>
</div>

<!-- ================================================================ APP -->
<div id="app" style="display:none;width:100%;display:none">
<div class="sidebar">
  <div class="sb-logo">KINTAI<br><span>勤怠管理システム</span></div>
  <nav class="sb-nav" id="sb-nav"></nav>
  <div class="sb-user" onclick="toggleUserMenu()" id="sb-user-btn">
    <div class="sb-avatar" id="sb-av">山</div>
    <div style="flex:1">
      <div class="sb-name" id="sb-nm">山田 太郎</div>
      <div class="sb-role" id="sb-rl">一般社員</div>
    </div>
    <span id="sb-chevron" style="font-size:9px;color:var(--t3);transition:transform .2s">▲</span>
  </div>
  <div id="user-menu" style="border-top:1px solid var(--b);overflow:hidden;max-height:0;transition:max-height .25s ease">
    <div onclick="doLogout()" style="display:flex;align-items:center;gap:10px;padding:12px 18px;cursor:pointer;font-size:13px;color:var(--red);transition:background .12s" onmouseover="this.style.background='rgba(248,113,113,.07)'" onmouseout="this.style.background='transparent'">
      <span>⏻</span> ログアウト
    </div>
  </div>
</div>
<div class="main" id="main-content"></div>
</div>

<!-- Logout Modal -->
<div id="logout-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center">
  <div style="background:var(--s1);border:1px solid var(--b);border-radius:18px;padding:32px 28px;width:320px;text-align:center;animation:fadeIn .2s ease">
    <div style="font-size:36px;margin-bottom:12px">⏻</div>
    <div style="font-size:17px;font-weight:700;margin-bottom:6px">ログアウトしますか？</div>
    <div style="font-size:12px;color:var(--t2);margin-bottom:24px" id="logout-user-label">山田 太郎 さん</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button onclick="closeLogoutModal()" style="padding:11px;border-radius:10px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s" onmouseover="this.style.background='var(--s3)'" onmouseout="this.style.background='var(--s2)'">キャンセル</button>
      <button onclick="confirmLogout()" style="padding:11px;border-radius:10px;border:1px solid rgba(248,113,113,.3);background:rgba(248,113,113,.1);color:var(--red);font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s" onmouseover="this.style.background='rgba(248,113,113,.2)'" onmouseout="this.style.background='rgba(248,113,113,.1)'">ログアウト</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">✅ 操作が完了しました</div>

<script>
// ══════════════════════════════════════════════════
// デモデータ
// ══════════════════════════════════════════════════
const USERS = {
  'yamada@company.example.com':  { pass:'Emp@password123', name:'山田 太郎',   role:'employee', dept:'開発部',   av:'山', overtime:28 },
  'manager@company.example.com': { pass:'Mgr@password123', name:'田中 マネージャー', role:'manager', dept:'開発部', av:'田', overtime:12 },
  'hr@company.example.com':      { pass:'Hr@password123',  name:'鈴木 人事',   role:'hr',       dept:'人事部',   av:'鈴', overtime:5 },
};

const ROLE_LABEL = { employee:'一般社員', manager:'管理者', hr:'人事' };

const NAV = [
  { id:'stamp',   icon:'⏱', label:'打刻',             roles:['employee','manager','hr'] },

// ── 時計 ──────────────────────────────────────────
function tick() {
  const now = new Date();
  const hh  = String(now.getHours()).padStart(2,'0');
  const mm  = String(now.getMinutes()).padStart(2,'0');
  const ss  = String(now.getSeconds()).padStart(2,'0');
  const el  = document.getElementById('live-clock');
  if (el) el.textContent = `${hh}:${mm}:${ss}`;
}
setInterval(tick, 1000);

// ── ログイン ──────────────────────────────────────
function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const user  = USERS[email];
  if (!user || user.pass !== pass) {
    document.getElementById('login-err').style.display = 'block';
    return;
  }
  currentUser = { email, ...user };
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('sb-av').textContent = user.av;
  document.getElementById('sb-nm').textContent = user.name;
  document.getElementById('sb-rl').textContent = ROLE_LABEL[user.role];
  buildNav();
  navigate('stamp');
}

function doLogout() {
  currentUser = null;
  stampState  = { in:null, out:null, breakStart:null, breakTotal:0, status:'none' };
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-page').style.display = 'block';
  document.getElementById('login-err').style.display = 'none';
}

// ── ナビ構築 ──────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('sb-nav');
  nav.innerHTML = NAV.filter(n => n.roles.includes(currentUser.role)).map(n => `
    <div class="sb-item" id="nav-${n.id}" onclick="navigate('${n.id}')">
      <span class="icon">${n.icon}</span>${n.label}
    </div>
  `).join('');
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById(`nav-${page}`);
  if (navEl) navEl.classList.add('active');
  const content = document.getElementById('main-content');
  content.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'page active';
  div.innerHTML = PAGES[page]?.() || '<div style="padding:40px;color:var(--t2)">準備中</div>';
  content.appendChild(div);
  if (page === 'stamp') { tick(); startClock(); }
}

let clockTimer = null;
function startClock() {
  clearInterval(clockTimer);
  clockTimer = setInterval(tick, 1000);
}

// ── トースト ──────────────────────────────────────
function toast(msg, icon='✅') {
  const el = document.getElementById('toast');
  el.innerHTML = `${icon} ${msg}`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

    { icon:'📄', title:'自分の月次勤怠CSV', desc:'給与計算連携用（弥生・freee汎用）', color:'var(--acc)', bg:'rgba(56,189,248,.08)', border:'rgba(56,189,248,.2)', tags:['出退勤時刻','実働・残業時間','月次合計行'] },
    { icon:'👥', title:'全社員 月次勤怠CSV', desc:'給与計算システム一括取込み用', color:'var(--purple)', bg:'rgba(167,139,250,.08)', border:'rgba(167,139,250,.2)', tags:['社員コード付き','部署別','社員ごと小計'] },
    { icon:'🗂', title:'社員マスタCSV', desc:'社員情報・有給残日数一覧', color:'var(--green)', bg:'rgba(52,211,153,.08)', border:'rgba(52,211,153,.2)', tags:['全社員','有給残日数','勤務形態'] },
  ].filter((_,i) => i===0 || currentUser.role!=='employee').map(c => `
    <div style="background:var(--s1);border:1px solid var(--b);border-radius:12px;overflow:hidden;margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 20px">
        <div style="display:flex;align-items:flex-start;gap:14px">
          <span style="font-size:24px">${c.icon}</span>
          <div>
            <div style="font-size:13px;font-weight:600;color:${c.color};margin-bottom:4px">${c.title}</div>
            <div style="font-size:11px;color:var(--t3);margin-bottom:10px">${c.desc}</div>
            <div style="display:flex;gap:6px">${c.tags.map(t=>`<span style="font-size:10px;padding:1px 8px;border-radius:4px;border:1px solid ${c.border};background:${c.bg};color:${c.color}">${t}</span>`).join('')}</div>
          </div>
        </div>
        <button onclick="toast('CSVをダウンロードしました（デモ）','📥')" style="flex-shrink:0;padding:8px 16px;border-radius:10px;border:1px solid ${c.border};background:${c.bg};color:${c.color};font-size:12px;font-weight:600;cursor:pointer;margin-left:16px">↓ DL</button>
      </div>
    </div>
  `).join('')}`,
};

// ── 打刻処理 ──────────────────────────────────────
function doStamp(type) {
  const s = stampState;
  const now = Date.now();
  if (type==='in')       { s.in=now; s.status='working'; s.workType='office'; toast('出勤打刻しました　'+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}),'🏢'); }
  if (type==='remote')   { s.in=now; s.status='working'; s.workType='remote'; toast('在宅勤務を開始しました　'+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}),'🏠'); }
  if (type==='out')      { s.out=now; s.status='done';    toast('退勤打刻しました　'+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}),'🔴'); }
  if (type==='break')    { s.breakStart=now; s.status='breaking'; toast('休憩開始','☕'); }
  if (type==='breakEnd') { s.breakTotal+=Math.round((Date.now()-s.breakStart)/60000); s.breakStart=null; s.status='working'; toast('休憩終了','▶'); }
  navigate('stamp');
}

// ── 承認・却下 ────────────────────────────────────
function approve(id) {
  const a = approvals.find(x=>x.id===id);
  approvals = approvals.filter(x=>x.id!==id);
  toast(`${a.name}さんの${a.type}を承認しました`,'✅');
  navigate('admin');
}
function reject(id) {
  const a = approvals.find(x=>x.id===id);
  approvals = approvals.filter(x=>x.id!==id);
  toast(`${a.name}さんの${a.type}を却下しました`,'❌');
  navigate('admin');
}

// ── 種別選択 ──────────────────────────────────────
function selectType(el) {
  document.querySelectorAll('.type-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
}

// ── デモアカウント選択 ────────────────────────────
function selectAccount(email, pass) {
  document.getElementById('login-email').value = email;
  document.getElementById('login-pass').value  = pass;
  document.getElementById('login-err').style.display = 'none';
  document.querySelectorAll('.demo-account').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  // 少し間を置いてからログイン（選択されたのが見えるように）
  setTimeout(doLogin, 160);
}

// ── Enterキーでログイン ───────────────────────────
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
