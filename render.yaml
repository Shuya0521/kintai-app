services:
  - type: web
    name: kintai-app
    runtime: node
    plan: free
    buildCommand: npm install && cd packages/shared && npx prisma generate && cd ../.. && npm run build:app
    startCommand: npm run start --workspace=apps/kintai-app
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: kintai-admin
    runtime: node
    plan: free
    buildCommand: npm install && cd packages/shared && npx prisma generate && cd ../.. && npm run build:admin
    startCommand: npm run start --workspace=apps/kintai-admin
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
